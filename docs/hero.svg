<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" role="img" aria-label="Whisper Local: press hotkey, speak, text appears at cursor">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3fb950"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#30363d"/>
    </marker>
  </defs>

  <rect width="900" height="220" rx="12" fill="url(#bg)"/>

  <!-- Title strip -->
  <text x="40" y="44" font-family="ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="700" fill="#c9d1d9">Whisper Local</text>
  <text x="40" y="68" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#7d8590">Press a hotkey, speak, your words appear at the cursor — 100 % offline.</text>
  <line x1="40" y1="84" x2="860" y2="84" stroke="#21262d" stroke-width="1"/>

  <!-- Step 1: Keyboard chord -->
  <g transform="translate(50, 110)">
    <rect width="80" height="64" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
    <text x="40" y="40" font-family="ui-monospace, monospace" font-size="15" font-weight="600" fill="#c9d1d9" text-anchor="middle">Ctrl</text>
    <text x="120" y="40" font-family="ui-sans-serif, system-ui, sans-serif" font-size="20" fill="#7d8590" text-anchor="middle">+</text>
    <rect x="142" y="0" width="80" height="64" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
    <text x="182" y="40" font-family="ui-monospace, monospace" font-size="15" font-weight="600" fill="#c9d1d9" text-anchor="middle">Win</text>
    <text x="111" y="92" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#7d8590" text-anchor="middle">hold to record</text>
  </g>

  <!-- Arrow 1 -->
  <path d="M 290 142 L 340 142" stroke="#30363d" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Step 2: Mic + waveform -->
  <g transform="translate(360, 110)">
    <circle cx="32" cy="32" r="28" fill="#21262d" stroke="url(#accent)" stroke-width="2"/>
    <!-- Mic body -->
    <rect x="25" y="18" width="14" height="22" rx="7" fill="#3fb950"/>
    <path d="M 18 32 Q 18 46 32 46 Q 46 46 46 32" stroke="#3fb950" stroke-width="2" fill="none"/>
    <line x1="32" y1="46" x2="32" y2="52" stroke="#3fb950" stroke-width="2"/>
    <!-- Waveform -->
    <g stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round">
      <line x1="74" y1="32" x2="74" y2="32"/>
      <line x1="86" y1="22" x2="86" y2="42"/>
      <line x1="98" y1="12" x2="98" y2="52"/>
      <line x1="110" y1="20" x2="110" y2="44"/>
      <line x1="122" y1="6" x2="122" y2="58"/>
      <line x1="134" y1="22" x2="134" y2="42"/>
      <line x1="146" y1="14" x2="146" y2="50"/>
      <line x1="158" y1="26" x2="158" y2="38"/>
      <line x1="170" y1="20" x2="170" y2="44"/>
    </g>
    <text x="100" y="92" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#7d8590" text-anchor="middle">Whisper · faster-whisper · runs on your machine</text>
  </g>

  <!-- Arrow 2 -->
  <path d="M 555 142 L 605 142" stroke="#30363d" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Step 3: Cursor with text -->
  <g transform="translate(625, 100)">
    <rect width="230" height="84" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
    <text x="16" y="34" font-family="ui-monospace, monospace" font-size="13" fill="#7d8590">~/notes.md</text>
    <line x1="16" y1="44" x2="214" y2="44" stroke="#21262d" stroke-width="1"/>
    <text x="16" y="68" font-family="ui-monospace, monospace" font-size="13" fill="#c9d1d9">The quick brown fox</text>
    <line x1="156" y1="56" x2="156" y2="74" stroke="#3fb950" stroke-width="2"/>
    <text x="115" y="102" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#7d8590" text-anchor="middle">pasted at the cursor</text>
  </g>
</svg>
