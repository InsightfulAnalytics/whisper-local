# winget installer manifest TEMPLATE for Whisper Local.
#
# This is a starting point — the EASY way to produce a correct, current manifest
# is the `wingetcreate` tool (see docs/distribution.md), which fills in the
# version, URL, and SHA256 for you and validates the schema. Use this file only
# as a reference for what the result looks like.
#
# Placeholders to replace after a release exists:
#   <VERSION>     e.g. 0.10.0
#   <SHA256>      lowercase hex from whisper-local.exe.sha256 in the release
#
# winget treats a bare .exe as a "portable" install (it adds the exe to PATH
# and creates an `Add/Remove Programs` entry; no installer wizard needed).

PackageIdentifier: drajb.WhisperLocal
PackageVersion: <VERSION>
InstallerType: portable
Commands:
  - whisper-local
Installers:
  - Architecture: x64
    InstallerUrl: https://github.com/drajb/whisper-local/releases/download/v<VERSION>/whisper-local.exe
    InstallerSha256: <SHA256>
ManifestType: installer
ManifestVersion: 1.6.0
