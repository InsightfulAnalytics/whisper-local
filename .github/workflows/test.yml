name: Tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  smoke:
    # Windows is the primary platform; macOS is supported. Run the smoke suite
    # on all three so platform-specific import/path regressions surface in CI.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # Smoke tests deliberately avoid the heavy ML stack (faster-whisper, ctranslate2)
      # but a handful need numpy and pyperclip via transitive module-level imports.
      # Keep this list tight — anything heavier should be skipped behind a feature flag.
      - run: pip install ruamel.yaml numpy pyperclip
      - run: python -m unittest tests.test_smoke -v
