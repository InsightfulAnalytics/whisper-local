name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    # Windows is the primary platform; macOS is supported. Run the smoke suite
    # on all three so platform-specific import/path regressions surface in CI.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # Smoke tests deliberately avoid the heavy ML stack (faster-whisper, ctranslate2)
      # but a handful need numpy and pyperclip via transitive module-level imports.
      # Keep this list tight — anything heavier should be skipped behind a feature flag.
      - run: pip install ruamel.yaml numpy pyperclip
      # The Windows-only native-runtime tests import platform.windows.app, which
      # pulls in pywin32 (win32api) transitively. It's a declared app dependency
      # on Windows, so install it here rather than skipping the crash-guard tests.
      - if: runner.os == 'Windows'
        run: pip install pywin32
      - run: python -m unittest tests.test_smoke -v
