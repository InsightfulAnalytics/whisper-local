name: 💡 Feature request
description: Suggest a new capability or improvement
title: "[Feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Please check [open issues](https://github.com/InsightfulAnalytics/whisper-local/issues?q=is%3Aissue) and [discussions](https://github.com/InsightfulAnalytics/whisper-local/discussions) first to see if something similar is already on the radar.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation that made you want this feature. Concrete user stories are most helpful.
      placeholder: "I dictate emails 50× a day and I'd love to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would the ideal behaviour look like?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, including any workarounds you're currently using.

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      description: Whisper Local is a privacy-first tool. Confirm one of the following:
      options:
        - label: This feature works fully offline (no audio or transcript leaves the machine).
        - label: This feature requires an external service, and that should be opt-in.

  - type: checkboxes
    id: contribution
    attributes:
      label: Are you interested in implementing this?
      options:
        - label: I'd be willing to open a PR for this.
