# Whisper Local — Per-app rules
#
# When a transcription is about to be delivered, the foreground window is
# inspected. If its exe name OR window title contains any "match" string,
# the rule applies and overrides the global behaviour for that delivery.
#
# Supported overrides:
#   auto_send:   true | false   - force ENTER after paste (auto-send)
#   auto_paste:  true | false   - force or suppress paste-to-cursor
#   suppress:    true           - skip delivery entirely (only log + recent)
#   initial_prompt: <string>    - prime Whisper with context for this app
#                                 (concatenated after your global initial_prompt)
#   language:    "en"|"es"|...  - force a transcription language for this app
#   task:        "transcribe"   - or "translate" (Whisper outputs English)
#   capitalize_first:     true | false  - override global postprocess for this app
#   ensure_punctuation:   true | false  - "
#   strip_trailing_period:true | false  - "
#   inline_formatting:    true | false  - "
#
# The four formatting overrides let you adapt the writing style per app — e.g.
# verbatim/no-capitalization in a code editor, full sentences in email. Only the
# keys you set override your global postprocess config; others are inherited.
#
# Rules are matched top-down; first match wins. Edit this file freely;
# it hot-reloads on the next transcription.

rules:
  # Chat apps: send the message immediately, casual tone bias
  - match: ["slack.exe", "discord.exe", "telegram.exe", "whatsapp.exe", "Slack", "Discord"]
    auto_send: true
    initial_prompt: "Casual chat message. Conversational tone."

  # Email clients: professional bias, no auto-send
  - match: ["outlook.exe", "thunderbird.exe", "Mail"]
    initial_prompt: "Professional email body. Polite, clear sentences."

  # Code editors: never auto-send, never paste — copy only so the user
  # decides where it lands; identifier/path bias. Keep it verbatim: no forced
  # capitalization or trailing period (code isn't prose).
  - match: ["code.exe", "cursor.exe", "windsurf.exe", "rider64.exe", "pycharm64.exe", "idea64.exe"]
    auto_paste: false
    initial_prompt: "Programming context. Identifiers, snake_case, camelCase, file paths, regex."
    capitalize_first: false
    ensure_punctuation: false

  # Password managers: never deliver dictation into a password field
  - match: ["1password.exe", "1password-7.exe", "lastpass.exe", "bitwarden.exe", "keepass.exe", "keepassxc.exe"]
    suppress: true

  # Terminals: copy only — pasting into a terminal can run commands
  - match: ["windowsterminal.exe", "wt.exe", "conhost.exe", "powershell.exe", "cmd.exe", "alacritty.exe", "wezterm-gui.exe"]
    auto_paste: false
